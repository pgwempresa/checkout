<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CheckoutPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
  <div class="bg-orbs"></div>
  <div class="bg-grid"></div>

  <div class="login-page">
    <div class="login-card fu">
      <div class="login-brand">
        <div class="brand-icon" style="width:32px;height:32px;font-size:16px;">⚡</div>
        <span class="brand-name" style="font-size:16px;">CheckoutPay</span>
        <span class="brand-tag">Admin</span>
      </div>

      <div>
        <h1 class="login-title">Acesso restrito</h1>
        <p class="login-sub">Painel de gerenciamento de checkout e adquirentes.</p>
      </div>

      <form id="login-form">
        <div class="field">
          <label class="field-label" for="password">Senha de admin</label>
          <input
            class="field-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••••••"
            autocomplete="current-password"
            autofocus
            required
          >
        </div>

        <div class="login-error" id="login-error"></div>

        <button type="submit" class="btn-login" id="login-btn">
          Entrar no painel
        </button>
      </form>

      <p class="muted mt-12" style="text-align:center;">
        Defina <code style="font-family:var(--mono);font-size:10px;background:var(--surface-h);padding:2px 5px;border-radius:4px;">ADMIN_PASSWORD</code> no <code style="font-family:var(--mono);font-size:10px;background:var(--surface-h);padding:2px 5px;border-radius:4px;">.env</code>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem("admin_token")) {
      window.location.replace("/");
    }

    const form  = document.getElementById("login-form");
    const errEl = document.getElementById("login-error");
    const btn   = document.getElementById("login-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.classList.remove("show");
      btn.disabled = true;
      btn.textContent = "Verificando...";

      try {
        const res  = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("password").value })
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) throw new Error(data.message || "Erro ao autenticar.");

        localStorage.setItem("admin_token", data.token);
        window.location.replace("/");
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Entrar no painel";
      }
    });
  </script>
</body>
</html>
